<!DOCTYPE html>
<html>
<head>
    <title>My Expense Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', sans-serif;
        }

        body{
            overflow-x:hidden;
        }

        /* VIDEO BACKGROUND */
        .back-video{
            position:fixed;
            right:0;
            bottom:0;
            min-width:100%;
            min-height:100%;
            object-fit:cover;
            z-index:-1;
        }

        /* DARK OVERLAY */
        .overlay{
            position:fixed;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.55);
            z-index:-1;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:auto;
            padding:50px 0;
        }

        /* HEADER */
        .header{
            text-align:center;
            color:white;
            margin-bottom:50px;
        }

        .header h1{
            font-size:42px;
            background: linear-gradient(45deg,#00f5ff,#ff00c8);
            background-clip:text;
            color:transparent;
        
        }
        .header p{
            margin-top:10px;
            font-size:18px;
            opacity:0.8;
        }

        /* CARDS */
        .cards{
            display:flex;
            gap:25px;
            flex-wrap:wrap;
            margin-bottom:40px;
        }

        .card{
            flex:1;
            min-width:250px;
            padding:30px;
            border-radius:20px;
            text-align:center;
            color:white;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(12px);
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
            transition:0.4s;
        }

        .card:hover{
            transform:translateY(-10px) scale(1.05);
        }

        .card h3{
            margin-bottom:15px;
            font-weight:600;
        }

        .card p{
            font-size:26px;
            font-weight:bold;
        }

        /* CATEGORY SECTION */
        .categories{
            padding:30px;
            border-radius:20px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(12px);
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
            color:white;
        }

        .categories h2{
            margin-bottom:25px;
            text-align:center;
        }

        .category-item{
            display:flex;
            justify-content:space-between;
            padding:15px 0;
            border-bottom:1px solid rgba(255,255,255,0.2);
            font-size:17px;
        }

        .category-item:last-child{
            border-bottom:none;
        }

        .amount{
            font-weight:600;
        }

        /* BUTTON */
        .add-btn{
            display:block;
            margin:30px auto 0;
            padding:12px 35px;
            border:none;
            border-radius:30px;
            font-size:16px;
            cursor:pointer;
            background:linear-gradient(45deg,#6C63FF,#FF6584);
            color:white;
            transition:0.3s;
        }

        .add-btn:hover{
            transform:scale(1.1);
        }

        footer{
            text-align:center;
            margin-top:60px;
            color:white;
            opacity:0.7;
        }

        /* RESPONSIVE */
        @media(max-width:768px){
            .cards{
                flex-direction:column;
            }

            .header h1{
                font-size:32px;
            }
        }

    </style>
</head>

<body>

    <!-- Background Video -->
    <video autoplay loop muted playsinline class="back-video">
        <source src="sample video.mp4" type="video/mp4">
    </video>

    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <div class="container">

        <div class="header">
            <h1>💰 My Expense Tracker</h1>
            <p>Track your monthly spending smartly</p>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total Spent</h3>
                <p>₹15,000</p>
            </div>

            <div class="card">
                <h3>Highest Category</h3>
                <p>Shopping</p>
            </div>

            <div class="card">
                <h3>Current Month</h3>
                <p>March 2026</p>
            </div>
        </div>

        <div class="categories">
            <h2>Expense Categories</h2>

            <div class="category-item">
                <span>Food</span>
                <span class="amount">₹4,000</span>
            </div>

            <div class="category-item">
                <span>Transport</span>
                <span class="amount">₹2,000</span>
            </div>

            <div class="category-item">
                <span>Shopping</span>
                <span class="amount">₹6,000</span>
            </div>

            <div class="category-item">
                <span>Entertainment</span>
                <span class="amount">₹3,000</span>
            </div>

            <button class="add-btn">+ Add Expense</button>
        </div>

        <footer>
            © 2026 Personal Expense Tracker | Designed by Tamizharasan
        </footer>

    </div>

</body>
</html>
